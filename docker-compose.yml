
services:
  db:
    image: postgres:15
    container_name: postgresql-paathshala
    restart: unless-stopped
    environment:
      POSTGRES_DB: paathshala-db
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
    ports:
      - "5432:5432"

    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: paathshala-pgadmin
    logging:
      driver: "none"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@pgadmin4.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_CONSOLE_LOG_LEVEL: 50
      GUNICORN_ACCESS_LOGFILE: /dev/null
    ports:
      - "8082:80"   # pgAdmin accessible on localhost:8082
    depends_on:
      - db

  app:
    build: .
    container_name: paathshala
    depends_on:
      - db
    ports:
      - "8081:8081"

    env_file:
      - .env
    environment:
      - SPRING_AI_OLLAMA_BASE_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"

    restart: unless-stopped
    stop_grace_period: 30s
    # Add volumes for uploads
    volumes:
      - ./uploads/notes:/uploads/notes
      - ./uploads/videos:/uploads/videos
      - ./uploads/modelQuestions:/uploads/modelQuestions
      - ./uploads/images:/uploads/images

volumes:
  pgdata:
